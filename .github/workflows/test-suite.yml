name: Test Suite

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'src/adapter/**'
      - 'src/bridge/**'
      - 'src/core/**'
      - 'src/cli/**'
      - 'src/lib/**'
      - 'tools/**'
      - 'examples/**'
      - 'composer.lock'
  push:
    branches: [ 1.x ]
    paths-ignore:
      - 'CHANGELOG.md'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-analyze:
    uses: ./.github/workflows/job-static-analyze.yml

  tests:
    uses: ./.github/workflows/job-tests.yml
    with:
      dependencies: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '["locked","lowest","highest"]' || '["locked"]' }}
    secrets: inherit

  examples:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/job-examples.yml

  extension-tests:
    uses: ./.github/workflows/job-extension-tests.yml

  windows-tests:
    uses: ./.github/workflows/job-windows-tests.yml

  website-tests:
    uses: ./.github/workflows/job-website-tests.yml

  mutation-tests:
    uses: ./.github/workflows/job-mutation-tests.yml

  benchmark-tests:
    uses: ./.github/workflows/job-benchmark-tests.yml